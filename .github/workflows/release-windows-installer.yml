name: Release Windows Installer

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Inno Setup
        shell: powershell
        run: |
          $iscc = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          if (-not $iscc) {
            throw "ISCC.exe is not available on this runner."
          }
          Write-Host "Using ISCC from $($iscc.Source)"

      - name: Build Windows installer
        shell: powershell
        run: .\packaging\windows\build-installer.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyama-windows-installer
          path: packaging/windows/build/dist/PyAMA-Setup-*.exe
          if-no-files-found: error

      - name: Attach installer to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/windows/build/dist/PyAMA-Setup-*.exe
